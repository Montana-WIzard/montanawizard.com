<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Affiliates — Montana Stream</title>
  <link rel="stylesheet" href="css/style.css" />

  <head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Montana Wizard Podcast</title>
  <link rel="icon" href="../images/MontanaWizard.png" type="image/png" />

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background-color: #0f1a14;
      color: #f4f4f4;
      line-height: 1.6;
    }

    header {
      background: linear-gradient(135deg, #1e3d2b, #0f1a14);
      padding: 3rem 1rem;
      text-align: center;
    }

    header h1 {
      font-size: 3rem;
      margin-bottom: 0.5rem;
    }

    header p {
      font-size: 1.2rem;
      opacity: 0.9;
    }

    main {
      max-width: 900px;
      margin: auto;
      padding: 2rem 1rem;
    }

    section {
      margin-bottom: 2.5rem;
    }

    h2 {
      border-left: 4px solid #4caf50;
      padding-left: 0.75rem;
      margin-bottom: 1rem;
    }

    .episodes li {
      margin-bottom: 0.5rem;
    }

    a {
      color: #4caf50;
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    footer {
      text-align: center;
      padding: 1.5rem;
      background-color: #0b130f;
      font-size: 0.9rem;
      opacity: 0.8;
    }
    .player {
  background-color: #0b130f;
  padding: 1.5rem;
  border-radius: 8px;
}

.player video {
  width: 100%;
  border-radius: 6px;
  margin-bottom: 1rem;
}

.controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 1rem;
}

.controls button {
  font-size: 1.5rem;
  padding: 0.4rem 0.8rem;
  background-color: #1e3d2b;
  color: #f4f4f4;
  border: none;
  border-radius: 4px;
  cursor: pointer;
}

.controls button:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.controls input {
  width: 80px;
  padding: 0.4rem;
  text-align: center;
  font-size: 1rem;
}

    .site-title {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.5rem;
}

.site-title img {
  height: 80px;
}

.ribbon-container {
  width: 150px;
  height: 150px;
  position: fixed;
  top: 0;
  right: 0;
  overflow: hidden;
  z-index: 999;
}

.top-ribbon {
  position: fixed;
  top: 0;
  left: 0;

  width: 100%;
  height: 48px;

  background: linear-gradient(135deg, #47ff50, #7fff6b);
  box-shadow: 0 4px 8px rgba(0,0,0,0.15);
  z-index: 9999;

  display: flex;
  align-items: center;
  justify-content: center;

  overflow: hidden;
}

/* Shared link style */
.top-ribbon a {
  position: absolute;
  color: #0b130f;
  text-decoration: none;
  font-weight: bold;
  font-size: 16px;
  letter-spacing: 1px;
  pointer-events: none;
  opacity: 0;
  transform: translateY(6px);
  animation: rotateText 6s infinite;
}

/* Second item delayed */
.top-ribbon .item-2 {
  animation-delay: 3s;
}

/* Make link clickable only when visible */
@keyframes rotateText {
  0% {
    opacity: 0;
    transform: translateY(6px);
    pointer-events: none;
  }
  10% {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  40% {
    opacity: 1;
    pointer-events: auto;
  }
  50% {
    opacity: 0;
    transform: translateY(-6px);
    pointer-events: none;
  }
  100% {
    opacity: 0;
    pointer-events: none;
  }
}

/* Optional hover effect */
.top-ribbon a:hover {
  text-decoration: underline;
}

  </style>
</head>
<body>
  <div id="site-header"></div>

  <main class="page">
  <h1>Affiliates</h1>
  <p>
    <a href="https://www.mountainwizardllc.com/">
      Mountain Wizard
    </a>
  </p>
  <p>
    <a href="https://montanastream.com/">
      Montana Stream
    </a>
  </p>
</main>

  <div id="site-footer"></div>
  <script src="js/include.js"></script>
</body>
</html>
